services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: knowledgeforge
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledgeforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G

  api:
    build:
      context: .
      dockerfile: src/KnowledgeForge.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5433;Database=knowledgeforge;Username=postgres;Password=root
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__Host: rabbitmq
      Chat__Provider: Ollama
      Chat__BaseUrl: http://ollama:11434
      Chat__Model: qwen2.5:3b
      Embeddings__Provider: Ollama
      Embeddings__BaseUrl: http://ollama:11434
      Embeddings__Model: nomic-embed-text
      Storage__BookPath: /data/books
    volumes:
      - book_data:/data/books
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: src/KnowledgeForge.Worker/Dockerfile
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5433;Database=knowledgeforge;Username=postgres;Password=root
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__Host: rabbitmq
      Chat__Provider: Ollama
      Chat__BaseUrl: http://ollama:11434
      Chat__Model: qwen2.5:3b
      Embeddings__Provider: Ollama
      Embeddings__BaseUrl: http://ollama:11434
      Embeddings__Model: nomic-embed-text
      Storage__BookPath: /data/books
    volumes:
      - book_data:/data/books
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  ollama_data:
  book_data:
